<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TaskFlow — Work Organizer</title>
  <link rel="stylesheet" href="/static/styles.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>TaskFlow</h1>
      <p class="subtitle">Stay organized, stay productive</p>
    </header>

    <div class="input-section">
      <input type="text" id="taskInput" placeholder="What needs to be done?" onkeypress="handleKeyPress(event)">
      <button class="btn-primary" onclick="addTask()">
        <span>✦</span> Add Task
      </button>
      <button class="btn-secondary" onclick="resetAll()">Reset All</button>
    </div>

    <div class="stats-bar">
      <div class="stat">
        <div class="stat-value" id="totalTasks">0</div>
        <div class="stat-label">Total</div>
      </div>
      <div class="stat">
        <div class="stat-value" id="dataComplete">0</div>
        <div class="stat-label">Data ✓</div>
      </div>
      <div class="stat">
        <div class="stat-value" id="workComplete">0</div>
        <div class="stat-label">Work ✓</div>
      </div>
    </div>

    <div class="column-headers">
      <div class="drag-col"></div>
      <div class="task-col">Task</div>
      <div class="status-col">Data</div>
      <div class="status-col">Work</div>
      <div class="delete-col"></div>
    </div>

    <ul id="taskList"></ul>
  </div>

  <script>
    let draggedItem = null;
    let draggedId = null;

    function handleKeyPress(e) {
      if (e.key === 'Enter') addTask();
    }

    function updateStats(tasks) {
      const total = tasks.length;
      const dataComplete = tasks.filter(t => t.data_status === "☑").length;
      const workComplete = tasks.filter(t => t.work_status === "☑").length;
      
      document.getElementById('totalTasks').textContent = total;
      document.getElementById('dataComplete').textContent = dataComplete;
      document.getElementById('workComplete').textContent = workComplete;
    }

    async function loadTasks() {
      const res = await fetch("/tasks");
      const tasks = await res.json();
      const list = document.getElementById("taskList");
      
      updateStats(tasks);
      
      if (tasks.length === 0) {
        list.innerHTML = `
          <li>
            <div class="empty-state">
              <div class="empty-state-icon">📋</div>
              <div class="empty-state-text">No tasks yet. Add one above!</div>
            </div>
          </li>
        `;
        return;
      }
      
      list.innerHTML = "";
      tasks.forEach((task, index) => {
        const li = document.createElement("li");
        li.setAttribute("draggable", "true");
        li.setAttribute("data-id", task.id);
        li.className = "task-item";
        li.innerHTML = `
          <div class="task-row" style="animation-delay: ${index * 0.05}s">
            <div class="drag-handle" title="Drag to reorder">⋮⋮</div>
            
            <input type="text" class="task-text" value="${escapeHtml(task.text)}" onchange="editTask(${task.id}, this.value)">
            
            <div class="status-group">
              <button class="status-btn ${task.data_status === "☑" ? 'active' : ''}" onclick="toggleStatus(${task.id}, 'data', this)" title="Data Status">
                ${task.data_status === "☑" ? '✓' : ''}
              </button>
            </div>

            <div class="status-group">
              <button class="status-btn ${task.work_status === "☑" ? 'active' : ''}" onclick="toggleStatus(${task.id}, 'work', this)" title="Work Status">
                ${task.work_status === "☑" ? '✓' : ''}
              </button>
            </div>

            <button class="delete-btn" onclick="deleteTask(${task.id})" title="Delete Task">✕</button>
          </div>
        `;
        
        // Drag event listeners
        li.addEventListener('dragstart', handleDragStart);
        li.addEventListener('dragend', handleDragEnd);
        li.addEventListener('dragover', handleDragOver);
        li.addEventListener('dragenter', handleDragEnter);
        li.addEventListener('dragleave', handleDragLeave);
        li.addEventListener('drop', handleDrop);
        
        list.appendChild(li);
      });
    }

    // Drag and Drop handlers
    function handleDragStart(e) {
      draggedItem = this;
      draggedId = this.getAttribute('data-id');
      this.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
      e.dataTransfer.setData('text/plain', draggedId);
      
      // Slight delay to allow the dragging class to apply before ghost image is captured
      setTimeout(() => {
        this.style.opacity = '0.4';
      }, 0);
    }

    function handleDragEnd(e) {
      this.classList.remove('dragging');
      this.style.opacity = '1';
      
      // Remove all drag-over classes
      document.querySelectorAll('.task-item').forEach(item => {
        item.classList.remove('drag-over', 'drag-over-top', 'drag-over-bottom');
      });
    }

    function handleDragOver(e) {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      
      // Determine if we're in the top or bottom half of the element
      const rect = this.getBoundingClientRect();
      const midpoint = rect.top + rect.height / 2;
      
      this.classList.remove('drag-over-top', 'drag-over-bottom');
      if (e.clientY < midpoint) {
        this.classList.add('drag-over-top');
      } else {
        this.classList.add('drag-over-bottom');
      }
    }

    function handleDragEnter(e) {
      e.preventDefault();
      if (this !== draggedItem) {
        this.classList.add('drag-over');
      }
    }

    function handleDragLeave(e) {
      this.classList.remove('drag-over', 'drag-over-top', 'drag-over-bottom');
    }

    async function handleDrop(e) {
      e.preventDefault();
      e.stopPropagation();
      
      if (this === draggedItem) return;
      
      const list = document.getElementById('taskList');
      const items = [...list.querySelectorAll('.task-item')];
      const dropTarget = this;
      
      // Determine position (before or after drop target)
      const rect = this.getBoundingClientRect();
      const midpoint = rect.top + rect.height / 2;
      const insertBefore = e.clientY < midpoint;
      
      // Reorder DOM
      if (insertBefore) {
        list.insertBefore(draggedItem, dropTarget);
      } else {
        list.insertBefore(draggedItem, dropTarget.nextSibling);
      }
      
      // Get new order
      const newOrder = [...list.querySelectorAll('.task-item')].map(item => 
        parseInt(item.getAttribute('data-id'))
      );
      
      // Send to server
      await fetch('/reorder', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ order: newOrder })
      });
      
      // Clean up classes
      this.classList.remove('drag-over', 'drag-over-top', 'drag-over-bottom');
    }

    function escapeHtml(text) {
      const div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    async function addTask() {
      const input = document.getElementById("taskInput");
      const task = input.value.trim();
      if (!task) return;

      const res = await fetch("/add", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ task })
      });
      const data = await res.json();
      if (data.success) {
        input.value = "";
        loadTasks();
      }
    }

    async function editTask(id, newText) {
      await fetch("/edit", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ id, new_text: newText })
      });
    }

    async function deleteTask(id) {
      await fetch(`/delete/${id}`, { method: "POST" });
      loadTasks();
    }

    async function toggleStatus(id, column, button) {
      await fetch(`/toggle/${id}/${column}`, { method: "POST" });
      
      const isActive = button.classList.contains('active');
      if (isActive) {
        button.classList.remove('active');
        button.textContent = '';
      } else {
        button.classList.add('active');
        button.textContent = '✓';
      }
      
      // Refresh stats
      const res = await fetch("/tasks");
      const tasks = await res.json();
      updateStats(tasks);
    }

    async function resetAll() {
      if (confirm('Reset all task statuses? This will uncheck all tasks.')) {
        await fetch("/reset", { method: "POST" });
        loadTasks();
      }
    }

    window.onload = loadTasks;
  </script>
</body>
</html>
